<input class="w-full bg-surface-container-lowest border border-outline-variant/20 text-on-surface rounded-lg px-4 py-3.5 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-fixed transition-all duration-200 placeholder:text-outline-variant" id="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-sm font-medium text-on-surface" for="password">Password</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/20 text-on-surface rounded-lg px-4 py-3.5 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-fixed transition-all duration-200 placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Options -->
<div class="flex items-center justify-between mt-1">
<label class="flex items-center gap-2.5 cursor-pointer group">
<div class="w-4 h-4 rounded border border-outline-variant/40 flex items-center justify-center group-hover:border-primary transition-colors bg-surface-container-lowest relative">
<input class="absolute opacity-0 cursor-pointer w-full h-full peer" type="checkbox"/>
<svg class="w-3 h-3 text-primary opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
</div>
