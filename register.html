<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Account - BudolView</title>
<!-- Google Fonts: Manrope (Display/Headline) & Inter (Body/Label) -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Design System Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#bccac1",
                    "background": "#f7f9fb",
                    "on-secondary-fixed-variant": "#8d1600",
                    "surface-container-highest": "#e0e3e5",
                    "error": "#ba1a1a",
                    "secondary-fixed": "#ffdad3",
                    "on-primary-fixed": "#002115",
                    "on-primary-container": "#f5fff7",
                    "tertiary-container": "#5161ff",
                    "primary": "#00694c",
                    "primary-fixed": "#86f8c9",
                    "secondary-container": "#fd5837",
                    "on-tertiary-fixed-variant": "#001be1",
                    "on-tertiary-container": "#fffbff",
                    "error-container": "#ffdad6",
                    "tertiary-fixed": "#e0e0ff",
                    "tertiary": "#263aff",
                    "primary-fixed-dim": "#68dbae",
                    "on-secondary-container": "#580a00",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed-variant": "#00513a",
                    "on-secondary-fixed": "#3e0500",
                    "on-error": "#ffffff",
                    "surface-dim": "#d8dadc",
                    "outline": "#6d7a73",
                    "surface-container-low": "#f2f4f6",
                    "on-secondary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#eceef0",
                    "surface": "#f7f9fb",
                    "secondary-fixed-dim": "#ffb4a4",
                    "on-surface-variant": "#3d4943",
                    "inverse-on-surface": "#eff1f3",
                    "on-tertiary-fixed": "#000767",
                    "on-primary": "#ffffff",
                    "surface-container-high": "#e6e8ea",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#bdc2ff",
                    "surface-tint": "#006c4e",
                    "primary-container": "#008560",
                    "on-background": "#191c1e",
                    "secondary": "#b62506",
                    "on-surface": "#191c1e",
                    "inverse-surface": "#2d3133",
                    "inverse-primary": "#68dbae",
                    "surface-variant": "#e0e3e5",
                    "surface-bright": "#f7f9fb"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope", "sans-serif"],
                    "display": ["Manrope", "sans-serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"]
            }
          }
        }
      }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-surface-container-lowest/80 backdrop-blur-xl border border-surface-container-lowest shadow-[0_12px_40px_rgba(25,28,30,0.06)];
            }
            .ghost-input {
                @apply bg-surface-container-lowest border-[1px] border-outline-variant/20 rounded-lg px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-fixed/30 transition-all duration-200;
            }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary-fixed selection:text-on-primary-fixed relative overflow-x-hidden">
<!-- Decorative Background Element -->
<div aria-hidden="true" class="absolute top-0 left-0 w-full h-96 bg-gradient-to-b from-primary/5 to-transparent -z-10 pointer-events-none"></div>
<div aria-hidden="true" class="absolute -top-40 -right-40 w-96 h-96 bg-primary-fixed/10 rounded-full blur-3xl -z-10 pointer-events-none"></div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f7f9fb]/80 dark:bg-[#191c1e]/80 backdrop-blur-lg font-['Manrope'] antialiased">
<div class="flex justify-between items-center px-6 py-4 max-w-full">
<div class="text-xl font-bold tracking-tight text-[#1D9E75]">
                BudolView
            </div>
<div class="flex items-center">
<button aria-label="Help" class="text-[#3d4943] dark:text-zinc-400 hover:bg-[#f2f4f6] dark:hover:bg-zinc-800 transition-colors duration-200 p-2 rounded-full flex items-center justify-center group">
<span class="material-symbols-outlined group-hover:opacity-80 group-active:scale-95 transition-all" data-icon="help_outline">help_outline</span>
</button>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center px-4 pt-28 pb-12 w-full max-w-7xl mx-auto z-10">
<div class="w-full max-w-md glass-panel rounded-xl p-8 md:p-10 relative overflow-hidden">
<!-- Subtle accent top line -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-primary-fixed opacity-80"></div>
<div class="mb-8">
<h1 class="font-display text-2xl md:text-3xl font-bold text-on-surface tracking-tight mb-2">Create Account</h1>
<p class="text-on-surface-variant font-body text-sm">Join the curated shopping experience.</p>
</div>
<form action="#" class="space-y-5" method="POST">
<div class="space-y-1">
<label class="block text-sm font-medium text-on-surface-variant font-label" for="fullName">Full Name</label>
<input class="ghost-input w-full" id="fullName" name="fullName" placeholder="Juan Dela Cruz" required="" type="text"/>
</div>
<div class="space-y-1">
<label class="block text-sm font-medium text-on-surface-variant font-label" for="email">Email Address</label>
<input class="ghost-input w-full" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
<div class="space-y-1">
<label class="block text-sm font-medium text-on-surface-variant font-label" for="password">Password</label>
<input class="ghost-input w-full" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="space-y-1">
<label class="block text-sm font-medium text-on-surface-variant font-label" for="confirmPassword">Confirm Password</label>
<input class="ghost-input w-full" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex items-start pt-2 pb-4">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant/30 text-primary focus:ring-primary-fixed bg-surface-container-lowest cursor-pointer" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-body text-on-surface-variant cursor-pointer" for="terms">I agree to the <a class="text-primary hover:text-primary-container font-medium transition-colors" href="#">Terms and Conditions</a></label>
</div>
</div>
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-lg py-3.5 px-4 font-headline font-semibold tracking-wide hover:opacity-90 active:scale-[0.98] transition-all duration-200 shadow-sm flex justify-center items-center gap-2 group" type="submit">
                    Create Account
                    <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-8 text-center">
<p class="text-sm font-body text-on-surface-variant">
                    Already have an account? 
                    <a class="font-semibold text-primary hover:text-primary-container transition-colors" href="#">Log in</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-8 mt-auto bg-[#f7f9fb] dark:bg-[#191c1e] border-t border-[#1D9E75]/10 font-['Inter'] text-sm z-10">
<div class="flex flex-col md:flex-row justify-between items-center px-8 gap-4 text-[#3d4943] dark:text-zinc-500">
<div>© 2024 BudolView. Curated Value.</div>
<div class="flex gap-6">
<a class="hover:text-[#1D9E75] transition-colors" href="#">Terms of Service</a>
<a class="hover:text-[#1D9E75] transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-[#1D9E75] transition-colors" href="#">Help Center</a>
</div>
</div>
</footer>
</body></html>
